name: cache

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: build nssh (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: macos-latest
            system: aarch64-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: abizer
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Disable the daemon-mode post-step push; we push explicitly
          # below so the job fails hard on push errors instead of racing
          # the runner teardown (the darwin job hit a drain-timeout and
          # silently dropped the final store path).
          skipPush: true

      - name: Build and push
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix build .#packages.${{ matrix.system }}.default --print-out-paths \
            | cachix push abizer
