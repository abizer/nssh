name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master'
    uses: ./.github/workflows/test.yaml

  goreleaser:
    needs: test
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Bump and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          git fetch --tags --force
          # If a previous run already pushed a release tag for HEAD (e.g. it
          # failed in goreleaser and is being retried), reuse it instead of
          # bumping again and orphaning the original.
          existing=$(git tag --points-at HEAD --list 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -n1 || true)
          if [ -n "${existing}" ]; then
            echo "Reusing existing tag ${existing} on HEAD"
            exit 0
          fi
          latest=$(git tag --list 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -n1 || true)
          latest=${latest:-v0.0.0}
          IFS='.' read -r major minor patch <<< "${latest#v}"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "Bumping ${latest} -> ${next}"
          git tag "${next}"
          git push origin "${next}"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
